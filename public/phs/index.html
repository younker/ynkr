<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex">
<title>PHS Facilities Calendar</title>
<style>
  :root {
    --master: #1a73e8;
    --ad: #188038;
    --sportsyou: #e8710a;
    --border: #dadce0;
    --text: #3c4043;
    --muted: #70757a;
    --hour-height: 48px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Google Sans', Roboto, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif;
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 8px 16px;
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
    flex-shrink: 0;
  }
  header h1 { font-size: 22px; font-weight: 400; margin-right: 12px; white-space: nowrap; }
  .btn {
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text);
    cursor: pointer;
    font-size: 14px;
    padding: 7px 14px;
  }
  .btn:hover { background: #f1f3f4; }
  .nav-arrow { border: none; font-size: 18px; padding: 6px 10px; border-radius: 50%; }
  #range-label { font-size: 20px; font-weight: 400; white-space: nowrap; }
  .spacer { flex: 1; }
  .view-switch { display: flex; border: 1px solid var(--border); border-radius: 4px; overflow: hidden; }
  .view-switch .btn { border: none; border-radius: 0; }
  .view-switch .btn.active { background: #e8f0fe; color: var(--master); }

  #filters {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 16px;
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
    flex-shrink: 0;
  }
  .chip {
    border: 1px solid var(--border);
    border-radius: 16px;
    background: #fff;
    color: var(--muted);
    cursor: pointer;
    font-size: 13px;
    padding: 5px 12px;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
  .chip .dot { width: 10px; height: 10px; border-radius: 50%; background: #bbb; }
  .chip.on { color: #fff; border-color: transparent; }
  .chip.on .dot { background: rgba(255,255,255,.85); }
  .chip.src-master.on { background: var(--master); }
  .chip.src-ad.on { background: var(--ad); }
  .chip.src-sportsyou.on { background: var(--sportsyou); }
  .chip.facility.on { background: #5f6368; }
  .filter-label { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: .8px; }
  .divider { width: 1px; height: 22px; background: var(--border); }

  main { flex: 1; overflow: hidden; display: flex; flex-direction: column; }

  /* month view */
  #month { flex: 1; display: none; flex-direction: column; overflow: hidden; }
  #month.visible { display: flex; }
  .month-dow {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .month-dow div { text-align: center; font-size: 11px; color: var(--muted); padding: 4px; text-transform: uppercase; }
  .month-grid { flex: 1; display: grid; grid-template-columns: repeat(7, 1fr); overflow-y: auto; }
  .month-cell {
    border-right: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    padding: 2px;
    min-height: 96px;
    overflow: hidden;
    font-size: 12px;
  }
  .month-cell .day-num {
    display: inline-block;
    font-size: 12px;
    width: 22px; height: 22px; line-height: 22px;
    text-align: center;
    border-radius: 50%;
    margin-bottom: 2px;
  }
  .month-cell.other-month .day-num { color: #b8bcc1; }
  .month-cell.today .day-num { background: var(--master); color: #fff; }
  .pill {
    border-radius: 4px;
    color: #fff;
    cursor: pointer;
    font-size: 11px;
    line-height: 1.5;
    margin-bottom: 1px;
    overflow: hidden;
    padding: 0 4px;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .more-link { color: var(--muted); cursor: pointer; font-size: 11px; padding: 0 4px; }
  .more-link:hover { text-decoration: underline; }

  /* week view */
  #week { flex: 1; display: none; flex-direction: column; overflow: hidden; }
  #week.visible { display: flex; }
  .week-header { display: flex; border-bottom: 1px solid var(--border); flex-shrink: 0; }
  .gutter-spacer { width: 56px; flex-shrink: 0; }
  .week-day-col-head { flex: 1; text-align: center; padding: 6px 0; border-left: 1px solid var(--border); }
  .week-day-col-head .dow { font-size: 11px; color: var(--muted); text-transform: uppercase; }
  .week-day-col-head .num {
    font-size: 22px;
    width: 38px; height: 38px; line-height: 38px;
    margin: 2px auto 0;
    border-radius: 50%;
  }
  .week-day-col-head.today .num { background: var(--master); color: #fff; }
  .week-scroll { flex: 1; overflow-y: auto; display: flex; }
  .time-gutter { width: 56px; flex-shrink: 0; }
  .time-gutter div {
    height: var(--hour-height);
    font-size: 10px;
    color: var(--muted);
    text-align: right;
    padding-right: 6px;
    transform: translateY(-6px);
  }
  .week-grid { flex: 1; display: flex; position: relative; }
  .week-day-col { flex: 1; border-left: 1px solid var(--border); position: relative; }
  .hour-line { height: var(--hour-height); border-bottom: 1px solid #eceff1; }
  .event-block {
    position: absolute;
    border-radius: 4px;
    color: #fff;
    cursor: pointer;
    font-size: 11px;
    line-height: 1.3;
    overflow: hidden;
    padding: 2px 4px;
    border: 1px solid #fff;
  }
  .event-block .time { opacity: .85; font-size: 10px; }
  .src-master-bg { background: var(--master); }
  .src-ad-bg { background: var(--ad); }
  .src-sportsyou-bg { background: var(--sportsyou); }
  .cancelled { text-decoration: line-through; opacity: .55; }

  /* event detail popover */
  #detail {
    position: fixed;
    background: #fff;
    border-radius: 8px;
    box-shadow: 0 4px 16px rgba(0,0,0,.28);
    display: none;
    max-width: 340px;
    min-width: 240px;
    padding: 14px 16px;
    z-index: 10;
  }
  #detail.visible { display: block; }
  #detail h2 { font-size: 16px; font-weight: 500; margin-bottom: 6px; padding-right: 24px; }
  #detail p { font-size: 13px; color: var(--muted); margin-bottom: 3px; }
  #detail .close { position: absolute; top: 8px; right: 10px; border: none; background: none; font-size: 16px; cursor: pointer; color: var(--muted); }
  #detail .src-tag { display: inline-block; border-radius: 3px; color: #fff; font-size: 11px; padding: 1px 6px; margin-bottom: 6px; }

  @media (max-width: 700px) {
    header h1 { display: none; }
    #range-label { font-size: 15px; }
  }

  /* password gate: calendar chrome hidden until unlock */
  body.locked header, body.locked #filters, body.locked main { display: none; }
  #gate {
    display: none;
    align-items: center;
    justify-content: center;
    height: 100vh;
  }
  body.locked #gate { display: flex; }
  #gate input {
    border: 1px solid var(--border);
    border-radius: 4px;
    font-size: 15px;
    padding: 9px 12px;
    width: 220px;
  }
  #gate input:focus { outline: 2px solid var(--master); border-color: transparent; }
</style>
</head>
<body class="locked">
  <div id="gate">
    <form id="gate-form">
      <input type="password" id="gate-pw" autocomplete="off" autofocus aria-label="Password">
    </form>
  </div>
  <header>
    <h1>PHS Facilities</h1>
    <button class="btn" id="today-btn">Today</button>
    <button class="btn nav-arrow" id="prev-btn" aria-label="Previous">&#8249;</button>
    <button class="btn nav-arrow" id="next-btn" aria-label="Next">&#8250;</button>
    <span id="range-label"></span>
    <span class="spacer"></span>
    <div class="view-switch">
      <button class="btn" data-view="week">Week</button>
      <button class="btn" data-view="month">Month</button>
    </div>
  </header>

  <div id="filters">
    <span class="filter-label">Sources</span>
    <span id="source-chips"></span>
    <span class="divider"></span>
    <span class="filter-label">Facilities</span>
    <span id="facility-chips"></span>
  </div>

  <main>
    <div id="month">
      <div class="month-dow"></div>
      <div class="month-grid"></div>
    </div>
    <div id="week">
      <div class="week-header"></div>
      <div class="week-scroll">
        <div class="time-gutter"></div>
        <div class="week-grid"></div>
      </div>
    </div>
  </main>

  <div id="detail"></div>

<script>
(function () {
  'use strict';

  var SOURCES = [
    { key: 'master', label: 'Master Schedule' },
    { key: 'ad', label: 'AD Times' },
    { key: 'sportsyou', label: 'sportsYou' }
  ];
  var DOW = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
  var MONTHS = ['January', 'February', 'March', 'April', 'May', 'June', 'July',
    'August', 'September', 'October', 'November', 'December'];
  var HOUR_PX = 48;

  var state = {
    view: 'week',
    anchor: startOfDay(new Date()),
    sourcesOn: { master: true, ad: true, sportsyou: true },
    facilitiesOn: {},
    events: [],
    facilities: []
  };

  function startOfDay(d) { return new Date(d.getFullYear(), d.getMonth(), d.getDate()); }
  function addDays(d, n) { var c = new Date(d); c.setDate(c.getDate() + n); return c; }
  function startOfWeek(d) { return addDays(startOfDay(d), -d.getDay()); }
  function sameDay(a, b) {
    return a.getFullYear() === b.getFullYear() && a.getMonth() === b.getMonth() && a.getDate() === b.getDate();
  }
  function fmtTime(d) {
    var h = d.getHours() % 12 || 12;
    var m = d.getMinutes();
    return h + (m ? ':' + String(m).padStart(2, '0') : '') + (d.getHours() < 12 ? 'am' : 'pm');
  }

  function visibleEvents() {
    return state.events.filter(function (e) {
      if (!state.sourcesOn[e.source]) return false;
      // facility chips scope the master-schedule source only
      if (e.source === 'master' && e.facility && !state.facilitiesOn[e.facility]) return false;
      return true;
    });
  }

  function eventsOnDay(day) {
    return visibleEvents().filter(function (e) { return sameDay(e.startDate, day); });
  }

  /* ---------- filter chips ---------- */

  function renderChips() {
    var sc = document.getElementById('source-chips');
    sc.innerHTML = '';
    SOURCES.forEach(function (s) {
      var b = document.createElement('button');
      b.className = 'chip src-' + s.key + (state.sourcesOn[s.key] ? ' on' : '');
      b.innerHTML = '<span class="dot"></span>' + s.label;
      b.onclick = function () {
        state.sourcesOn[s.key] = !state.sourcesOn[s.key];
        render();
      };
      sc.appendChild(b);
    });

    var fc = document.getElementById('facility-chips');
    fc.innerHTML = '';
    state.facilities.forEach(function (f) {
      var b = document.createElement('button');
      b.className = 'chip facility' + (state.facilitiesOn[f] ? ' on' : '');
      b.textContent = f;
      b.onclick = function () {
        state.facilitiesOn[f] = !state.facilitiesOn[f];
        render();
      };
      fc.appendChild(b);
    });
  }

  /* ---------- detail popover ---------- */

  function showDetail(e, anchorEl) {
    var d = document.getElementById('detail');
    var src = SOURCES.filter(function (s) { return s.key === e.source; })[0];
    d.innerHTML =
      '<button class="close" aria-label="Close">&#10005;</button>' +
      '<span class="src-tag src-' + e.source + '-bg">' + src.label + '</span>' +
      '<h2' + (e.cancelled ? ' class="cancelled"' : '') + '></h2>' +
      '<p class="when"></p>' +
      (e.location ? '<p class="where"></p>' : '') +
      (e.notes ? '<p class="notes"></p>' : '');
    d.querySelector('h2').textContent = e.title;
    d.querySelector('.when').textContent =
      DOW[e.startDate.getDay()] + ', ' + MONTHS[e.startDate.getMonth()] + ' ' + e.startDate.getDate() +
      ' · ' + fmtTime(e.startDate) + ' – ' + fmtTime(e.endDate);
    if (e.location) d.querySelector('.where').textContent = e.location;
    if (e.notes) d.querySelector('.notes').textContent = e.notes;
    d.querySelector('.close').onclick = hideDetail;
    d.classList.add('visible');
    var r = anchorEl.getBoundingClientRect();
    var top = Math.min(r.top, window.innerHeight - d.offsetHeight - 12);
    var left = r.right + 8;
    if (left + d.offsetWidth > window.innerWidth) left = Math.max(8, r.left - d.offsetWidth - 8);
    d.style.top = Math.max(8, top) + 'px';
    d.style.left = left + 'px';
  }
  function hideDetail() { document.getElementById('detail').classList.remove('visible'); }
  document.addEventListener('click', function (ev) {
    if (!ev.target.closest('#detail') && !ev.target.closest('.pill') && !ev.target.closest('.event-block')) {
      hideDetail();
    }
  });

  /* ---------- month view ---------- */

  function renderMonth() {
    var dowRow = document.querySelector('.month-dow');
    dowRow.innerHTML = DOW.map(function (d) { return '<div>' + d + '</div>'; }).join('');

    var grid = document.querySelector('.month-grid');
    grid.innerHTML = '';
    var first = new Date(state.anchor.getFullYear(), state.anchor.getMonth(), 1);
    var cur = startOfWeek(first);
    var today = startOfDay(new Date());

    for (var i = 0; i < 42; i++) {
      (function (day) {
        var cell = document.createElement('div');
        cell.className = 'month-cell' +
          (day.getMonth() !== state.anchor.getMonth() ? ' other-month' : '') +
          (sameDay(day, today) ? ' today' : '');
        var num = document.createElement('span');
        num.className = 'day-num';
        num.textContent = day.getDate();
        cell.appendChild(num);

        var evs = eventsOnDay(day).sort(function (a, b) { return a.startDate - b.startDate; });
        var MAX = 4;
        evs.forEach(function (e, idx) {
          var pill = document.createElement('div');
          pill.className = 'pill src-' + e.source + '-bg' + (e.cancelled ? ' cancelled' : '');
          pill.textContent = fmtTime(e.startDate) + ' ' + e.title;
          pill.title = e.title;
          if (idx >= MAX) pill.style.display = 'none';
          pill.onclick = function (ev) { ev.stopPropagation(); showDetail(e, pill); };
          cell.appendChild(pill);
        });
        if (evs.length > MAX) {
          var more = document.createElement('div');
          more.className = 'more-link';
          more.textContent = '+' + (evs.length - MAX) + ' more';
          more.onclick = function () {
            cell.querySelectorAll('.pill').forEach(function (p) { p.style.display = ''; });
            more.remove();
          };
          cell.appendChild(more);
        }
        grid.appendChild(cell);
      })(cur);
      cur = addDays(cur, 1);
    }

    document.getElementById('range-label').textContent =
      MONTHS[state.anchor.getMonth()] + ' ' + state.anchor.getFullYear();
  }

  /* ---------- week view ---------- */

  // side-by-side layout for overlapping events within one day column
  function layoutDay(evs) {
    evs.sort(function (a, b) { return a.startDate - b.startDate || b.endDate - a.endDate; });
    var clusters = [];
    var cluster = null, clusterEnd = null;
    evs.forEach(function (e) {
      if (!cluster || e.startDate >= clusterEnd) {
        cluster = [];
        clusters.push(cluster);
        clusterEnd = e.endDate;
      } else if (e.endDate > clusterEnd) {
        clusterEnd = e.endDate;
      }
      cluster.push(e);
    });
    clusters.forEach(function (c) {
      var cols = [];
      c.forEach(function (e) {
        var placed = false;
        for (var i = 0; i < cols.length; i++) {
          if (e.startDate >= cols[i]) { e._col = i; cols[i] = e.endDate; placed = true; break; }
        }
        if (!placed) { e._col = cols.length; cols.push(e.endDate); }
      });
      c.forEach(function (e) { e._cols = cols.length; });
    });
  }

  function renderWeek() {
    var head = document.querySelector('.week-header');
    head.innerHTML = '<div class="gutter-spacer"></div>';
    var weekStart = startOfWeek(state.anchor);
    var today = startOfDay(new Date());

    for (var i = 0; i < 7; i++) {
      var day = addDays(weekStart, i);
      var h = document.createElement('div');
      h.className = 'week-day-col-head' + (sameDay(day, today) ? ' today' : '');
      h.innerHTML = '<div class="dow">' + DOW[day.getDay()] + '</div><div class="num">' + day.getDate() + '</div>';
      head.appendChild(h);
    }

    var gutter = document.querySelector('.time-gutter');
    gutter.innerHTML = '';
    for (var hr = 0; hr < 24; hr++) {
      var g = document.createElement('div');
      g.textContent = hr === 0 ? '' : (hr % 12 || 12) + (hr < 12 ? ' AM' : ' PM');
      gutter.appendChild(g);
    }

    var grid = document.querySelector('.week-grid');
    grid.innerHTML = '';
    for (var d = 0; d < 7; d++) {
      (function (day) {
        var col = document.createElement('div');
        col.className = 'week-day-col';
        for (var hr2 = 0; hr2 < 24; hr2++) {
          var line = document.createElement('div');
          line.className = 'hour-line';
          col.appendChild(line);
        }
        var evs = eventsOnDay(day);
        layoutDay(evs);
        evs.forEach(function (e) {
          var startMin = e.startDate.getHours() * 60 + e.startDate.getMinutes();
          var endMin = sameDay(e.startDate, e.endDate)
            ? e.endDate.getHours() * 60 + e.endDate.getMinutes()
            : 24 * 60;
          var block = document.createElement('div');
          block.className = 'event-block src-' + e.source + '-bg' + (e.cancelled ? ' cancelled' : '');
          block.style.top = (startMin / 60 * HOUR_PX) + 'px';
          block.style.height = Math.max(18, (endMin - startMin) / 60 * HOUR_PX - 2) + 'px';
          var w = 100 / e._cols;
          block.style.left = (e._col * w) + '%';
          block.style.width = 'calc(' + w + '% - 2px)';
          block.innerHTML = '<div class="title"></div><div class="time"></div>';
          block.querySelector('.title').textContent = e.title;
          block.querySelector('.time').textContent = fmtTime(e.startDate) + ' – ' + fmtTime(e.endDate);
          block.onclick = function (ev) { ev.stopPropagation(); showDetail(e, block); };
          col.appendChild(block);
        });
        grid.appendChild(col);
      })(addDays(weekStart, d));
    }

    var weekEnd = addDays(weekStart, 6);
    var label = weekStart.getMonth() === weekEnd.getMonth()
      ? MONTHS[weekStart.getMonth()] + ' ' + weekStart.getFullYear()
      : MONTHS[weekStart.getMonth()].slice(0, 3) + ' – ' + MONTHS[weekEnd.getMonth()].slice(0, 3) + ' ' + weekEnd.getFullYear();
    document.getElementById('range-label').textContent = label;
  }

  /* ---------- top-level render / nav ---------- */

  function render() {
    hideDetail();
    renderChips();
    document.getElementById('month').className = state.view === 'month' ? 'visible' : '';
    document.getElementById('week').className = state.view === 'week' ? 'visible' : '';
    document.querySelectorAll('.view-switch .btn').forEach(function (b) {
      b.classList.toggle('active', b.dataset.view === state.view);
    });
    if (state.view === 'month') renderMonth(); else renderWeek();
  }

  document.getElementById('today-btn').onclick = function () {
    state.anchor = startOfDay(new Date());
    render();
    if (state.view === 'week') scrollToMorning();
  };
  document.getElementById('prev-btn').onclick = function () { navigate(-1); };
  document.getElementById('next-btn').onclick = function () { navigate(1); };
  function navigate(dir) {
    if (state.view === 'month') {
      state.anchor = new Date(state.anchor.getFullYear(), state.anchor.getMonth() + dir, 1);
    } else {
      state.anchor = addDays(state.anchor, dir * 7);
    }
    render();
  }
  document.querySelectorAll('.view-switch .btn').forEach(function (b) {
    b.onclick = function () {
      state.view = b.dataset.view;
      render();
      if (state.view === 'week') scrollToMorning();
    };
  });

  function scrollToMorning() {
    document.querySelector('.week-scroll').scrollTop = 7 * HOUR_PX;
  }

  /* ---------- password gate ---------- */

  function b64bytes(s) {
    var bin = atob(s);
    var out = new Uint8Array(bin.length);
    for (var i = 0; i < bin.length; i++) out[i] = bin.charCodeAt(i);
    return out;
  }

  function decrypt(payload, password) {
    var enc = new TextEncoder();
    return crypto.subtle.importKey('raw', enc.encode(password), 'PBKDF2', false, ['deriveKey'])
      .then(function (base) {
        return crypto.subtle.deriveKey(
          { name: 'PBKDF2', hash: 'SHA-256', salt: b64bytes(payload.salt), iterations: payload.iter },
          base, { name: 'AES-GCM', length: 256 }, false, ['decrypt']);
      })
      .then(function (key) {
        return crypto.subtle.decrypt({ name: 'AES-GCM', iv: b64bytes(payload.iv) }, key, b64bytes(payload.ct));
      })
      .then(function (buf) { return JSON.parse(new TextDecoder().decode(buf)); });
  }

  function boot(data) {
    state.facilities = data.facilities;
    data.facilities.forEach(function (f) { state.facilitiesOn[f] = true; });
    state.events = data.events.map(function (e) {
      e.startDate = new Date(e.start);
      e.endDate = new Date(e.end);
      return e;
    });
    document.body.classList.remove('locked');
    render();
    scrollToMorning();
  }

  var payloadPromise = fetch('events.json.enc').then(function (r) { return r.json(); });

  function attempt(password, interactive) {
    return payloadPromise
      .then(function (payload) { return decrypt(payload, password); })
      .then(function (data) {
        sessionStorage.setItem('phs-pw', password);
        boot(data);
      })
      .catch(function () {
        if (interactive) {
          // wrong password: nothing but a blank page
          document.body.innerHTML = '';
        } else {
          sessionStorage.removeItem('phs-pw');
        }
      });
  }

  document.getElementById('gate-form').addEventListener('submit', function (ev) {
    ev.preventDefault();
    attempt(document.getElementById('gate-pw').value, true);
  });

  var cached = sessionStorage.getItem('phs-pw');
  if (cached) attempt(cached, false);
})();
</script>
</body>
</html>
